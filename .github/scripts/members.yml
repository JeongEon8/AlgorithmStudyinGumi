# ──────────────────────────────────────────────
# 알고리즘 스터디 멤버 설정
# 매주 목표가 바뀌면 이 파일만 수정.
#
# [goal 작성 규칙]
#   "플랫폼,레벨,개수"
#   플랫폼: programmers / baekjoon / leetcode / codetree / SWEA
#   레벨:   lv0~lv5 / bronze~ruby / easy~hard / none / D1~D8
#   OR 조건: "programmers,lv2,2 OR leetcode,medium,2"  → 합산 2개
#   AND 조건: "programmers,lv2,3 AND programmers,lv3,1" -> 합산 4
# 
#   백준 실버 3개/ 골드 2개
#   프로그래머스 lv1 3개 / Lv2 2개
#
# [exempt]
#   true  → 취업자배려전형 (달성여부·벌금 모두 -)
#   false → 일반 (벌금 적용)
# ──────────────────────────────────────────────

