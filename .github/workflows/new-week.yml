name: 📆 새로운 주차 자동 시작

on:
  schedule:
    - cron: "23 15 * * 1"
  workflow_dispatch:

jobs:
  new-week:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run new week script
        run: python .github/scripts/new_week.py
        
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "🗓️ 새로운 회차 시작 [skip ci]"
          git pull --rebase && git push
